name: NuGet Publish

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  CARGO_TERM_COLOR: always
  NuGetDirectory: ${{ github.workspace }}/nuget

jobs:
  release:
    name: Detect Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'changeset-release/main'
    outputs:
      was_published: ${{ steps.version_bumped.outputs.bumped }}
      version: ${{ steps.semver.outputs.version }}
      prerelease: ${{ steps.semver.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install PNPM
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Run Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          version: ./.github/scripts/update-version.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect version bump
        id: version_bumped
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          PREVIOUS_VERSION=$(git show HEAD^:package.json | jq -r .version)

          echo "Current version:  $CURRENT_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version
        if: steps.version_bumped.outputs.bumped == 'true'
        uses: apexskier/github-semver-parse@v1
        id: semver
        with:
          version: ${{ steps.version_bumped.outputs.version }}

  native:
    name: Native (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: release
    if: needs.release.outputs.was_published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-latest
            apt-packages: gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          - rid: osx-arm64
            os: macos-14
          - rid: osx-x64
            os: macos-14
          - rid: win-x64
            os: windows-latest
            windows-target: x86_64-pc-windows-msvc
          - rid: win-arm64
            os: ubuntu-latest
            use-docker: true
    steps:
      - uses: actions/checkout@v5

      - name: Install cross-compile apt packages
        if: matrix.apt-packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt-packages }}

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ ! matrix.use-docker }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ ! matrix.use-docker }}
        with:
          workspaces: MonoCloud.Cedar.FFI

      - name: Build native runtime
        shell: bash
        env:
          WINDOWS_TARGET: ${{ matrix.windows-target }}
        run: |
          set -euo pipefail
          args=(--target "${{ matrix.rid }}")
          if [[ "${{ matrix.use-docker }}" == "true" ]]; then
            args+=(--use-docker)
          else
            args+=(--install-targets)
          fi
          ./scripts/build-runtimes.sh "${args[@]}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: MonoCloud.Cedar/Runtimes/${{ matrix.rid }}/
          if-no-files-found: error

  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: [release, native]
    if: needs.release.outputs.was_published == 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: MonoCloud.Cedar/Runtimes

      - name: Pack
        run: dotnet pack MonoCloud.Cedar --configuration Release --output ${{ env.NuGetDirectory }} /p:ContinuousIntegrationBuild=true

      - name: Upload NuGet Packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectory }}/*.nupkg

  validate_nuget:
    name: Validate NuGet Packages
    runs-on: ubuntu-latest
    needs: [release, pack]
    if: needs.release.outputs.was_published == 'true'
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download NuGet Packages
        uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Install nuget validator
        run: dotnet tool update Meziantou.Framework.NuGetPackageValidation.Tool --global

      - name: Validate package
        run: meziantou.validate-nuget-package (Get-ChildItem "${{ env.NuGetDirectory }}/*.nupkg")

  publish_nuget:
    name: Publish NuGet Packages & Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release, validate_nuget]
    if: needs.release.outputs.was_published == 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish NuGet packages
        run: |
          dotnet nuget push "${{ env.NuGetDirectory }}/*.nupkg" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate

      - name: Extract Changelog for Specific Version
        id: extract_changelog
        env:
          TARGET_VERSION: ${{ needs.release.outputs.version }}
          CHANGELOG_FILE: 'CHANGELOG.md'
        run: |
          LOG_CONTENT=$(sed -n "/^## $TARGET_VERSION\$/,/^## /{/^## $TARGET_VERSION\$/d; /^## /d; p;}" $CHANGELOG_FILE)
          CLEAN_LOG_CONTENT=$(echo "$LOG_CONTENT" | sed 's/^[ \t]*//;s/[ \t]*$//' | sed '/^$/d')
          echo "changelog_content<<EOF" >> $GITHUB_OUTPUT
          echo "$CLEAN_LOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.release.outputs.version }}
          prerelease: ${{ !!needs.release.outputs.prerelease }}
          name: v${{ needs.release.outputs.version }}
          artifacts: ${{ env.NuGetDirectory }}/*.nupkg
          body: ${{ steps.extract_changelog.outputs.changelog_content }}
